
name: Build and Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  BACKEND_REPO: ${{ secrets.ECR_REPOSITORY_BACKEND }}
  FRONTEND_REPO: ${{ secrets.ECR_REPOSITORY_FRONTEND }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - id: login
        uses: aws-actions/amazon-ecr-login@v2

      - id: meta
        shell: bash
        run: |
          TAG=$(git rev-parse --short HEAD)
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build Backend
        uses: docker/build-push-action@v6
        with:
          context: ./ems/backend
          push: true
          tags: |
            ${{ steps.login.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login.outputs.registry }}/${{ env.BACKEND_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./ems/frontend
          push: true
          tags: |
            ${{ steps.login.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login.outputs.registry }}/${{ env.FRONTEND_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/${{ secrets.EC2_USER }}/ems

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e
            mkdir -p ~/ems
            cd ~/ems

            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            REGION="${{ secrets.AWS_REGION }}"
            TAG="${{ needs.build.outputs.image_tag }}"

            BACKEND_IMAGE="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/${{ secrets.ECR_REPOSITORY_BACKEND }}:$TAG"
            FRONTEND_IMAGE="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/${{ secrets.ECR_REPOSITORY_FRONTEND }}:$TAG"

            cat > .env <<EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            BACKEND_IMAGE=$BACKEND_IMAGE
            FRONTEND_IMAGE=$FRONTEND_IMAGE
            EOF

            aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"

            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            docker compose ps

            sleep 20

            curl -f http://localhost:8081/actuator/health
            curl -f http://localhost

            docker image prune -af
