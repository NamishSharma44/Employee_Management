name: Build and Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY_BACKEND: ${{ secrets.ECR_REPOSITORY_BACKEND }}
  ECR_REPOSITORY_FRONTEND: ${{ secrets.ECR_REPOSITORY_FRONTEND }}

jobs:

  ################################################################################
  # BUILD IMAGES
  ################################################################################

  build-and-push:

    name: Build & Push Docker Images

    runs-on: ubuntu-latest

    timeout-minutes: 20

    outputs:
      backend_image: ${{ steps.image-tags.outputs.backend_image }}
      frontend_image: ${{ steps.image-tags.outputs.frontend_image }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##########################################################################
      # Configure AWS
      ##########################################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      ##########################################################################
      # Login ECR
      ##########################################################################

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      ##########################################################################
      # Generate Tags
      ##########################################################################

      - name: Generate Docker Tags
        id: image-tags

        run: |

          REGISTRY=${{ steps.login-ecr.outputs.registry }}

          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          echo "backend_image=$REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "frontend_image=$REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:$SHORT_SHA" >> $GITHUB_OUTPUT

          echo "backend_latest=$REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:latest" >> $GITHUB_OUTPUT
          echo "frontend_latest=$REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:latest" >> $GITHUB_OUTPUT

      ##########################################################################
      # Buildx
      ##########################################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      ##########################################################################
      # Backend
      ##########################################################################

      - name: Build & Push Backend
        uses: docker/build-push-action@v6

        with:
          context: ./ems/backend
          push: true

          tags: |
            ${{ steps.image-tags.outputs.backend_image }}
            ${{ steps.image-tags.outputs.backend_latest }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      ##########################################################################
      # Frontend
      ##########################################################################

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6

        with:
          context: ./ems/frontend
          push: true

          tags: |
            ${{ steps.image-tags.outputs.frontend_image }}
            ${{ steps.image-tags.outputs.frontend_latest }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  ################################################################################
  # DEPLOY
  ################################################################################

  deploy:

    name: Deploy to EC2

    runs-on: ubuntu-latest

    timeout-minutes: 20

    needs: build-and-push

    steps:

      ##########################################################################
      # Checkout
      ##########################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##########################################################################
      # Copy Compose
      ##########################################################################

      - name: Copy docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          source: docker-compose.prod.yml
          target: /home/${{ secrets.EC2_USER }}/ems

      ##########################################################################
      # Deploy
      ##########################################################################

      - name: Deploy Application
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            set -e

            mkdir -p ~/ems

            cd ~/ems

            ##############################################################
            # Create .env
            ##############################################################

            cat > .env <<EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            BACKEND_IMAGE=${{ needs.build-and-push.outputs.backend_image }}
            FRONTEND_IMAGE=${{ needs.build-and-push.outputs.frontend_image }}
            EOF

            ##############################################################
            # Login ECR
            ##############################################################

            aws ecr get-login-password \
            --region ${{ secrets.AWS_REGION }} \
            | docker login \
              --username AWS \
              --password-stdin \
              $(echo "${{ needs.build-and-push.outputs.backend_image }}" | cut -d/ -f1)

            ##############################################################
            # Pull latest images
            ##############################################################

            docker compose \
            -f docker-compose.prod.yml \
            --env-file .env \
            pull

            ##############################################################
            # Start Containers
            ##############################################################

            docker compose \
            -f docker-compose.prod.yml \
            --env-file .env \
            up -d --remove-orphans

            ##############################################################
            # Show Status
            ##############################################################

            docker compose ps

            docker ps

            ##############################################################
            # Wait
            ##############################################################

            echo "Waiting for application..."

            sleep 40

            ##############################################################
            # Backend Health
            ##############################################################

            curl -f http://localhost:8081/actuator/health

            ##############################################################
            # Frontend Health
            ##############################################################

            curl -f http://localhost

            ##############################################################
            # Cleanup
            ##############################################################

            docker image prune -af

            docker builder prune -af

            echo "Deployment Successful"