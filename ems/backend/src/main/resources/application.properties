server.port=8081
spring.application.name=ems-backend

# MySQL database (persists on disk)
# Create the database first: CREATE DATABASE ems_db;
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.url=jdbc:mysql://localhost:3306/ems_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
#spring.datasource.username=root
#spring.datasource.password=qwerty123
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
#app.jwt.secret=ThisIsADevOnlySecretKeyForEMS_ChangeMeInProduction_MinLength32Bytes
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# File uploads
app.upload.dir=uploads

# Max upload size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


logging.level.org.springframework.security=DEBUG


management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never