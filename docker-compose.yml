version: "3.9"

services:
  mysql:
    image: mysql:8.0.43
    container_name: ems-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ems_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - ems-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: ems-backend:local
    container_name: ems-backend

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      DB_URL: jdbc:mysql://mysql:3306/ems_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root_password}
      JWT_SECRET: ${JWT_SECRET:-ChangeMeInProduction_Minimum32Characters}
      TZ: Asia/Kolkata

    ports:
      - "8081:8081"

    volumes:
      - uploads_data:/app/uploads

    networks:
      - ems-network

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    image: ems-frontend:local
    container_name: ems-frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "80:80"

    networks:
      - ems-network

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  uploads_data:

networks:
  ems-network:
    driver: bridge